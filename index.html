<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico Pymes</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <h1>Diagnóstico Pymes</h1>
    <input type="text" id="usuario" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>

  <!-- PANEL ADMIN -->
  <div id="adminPanel" class="card" style="display:none;">
    <h1>Panel Admin</h1>

    <h2>Crear Usuario</h2>
    <input type="text" id="newEmail" placeholder="Correo">
    <input type="password" id="newPassword" placeholder="Contraseña">
    <button onclick="crearUsuarioAdmin()">Crear Usuario</button>

    <hr>

    <h2>Usuarios</h2>
    <ul id="listaUsuarios"></ul>

    <button onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<!-- FIREBASE (VERSIÓN COMPATIBLE) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- CONFIG -->
<script src="firebase.js"></script>

<!-- LÓGICA -->
<script src="script.js"></script>

</body>
</html>
