<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico Pymes</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <h1>Diagnóstico Pymes</h1>
    <input type="text" id="usuario" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
  </div>

  <!-- PANEL ADMIN -->
  <div id="adminPanel" class="card" style="display:none;">
    <h1>Panel Admin</h1>

    <h2>Crear Usuario</h2>
    <input type="text" id="newEmail" placeholder="Correo">
    <input type="password" id="newPassword" placeholder="Contraseña">

    <select id="newRol">
      <option value="empresa">Empresa</option>
      <option value="admin">Admin</option>
    </select>

    <button onclick="crearUsuarioAdmin()">Crear Usuario</button>

    <hr>

    <h2>Usuarios</h2>
    <ul id="listaUsuarios"></ul>

    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <!-- PANEL EMPRESA -->
  <div id="empresaPanel" class="card" style="display:none;">
    <h1>Diagnóstico Empresarial</h1>

    <input type="text" id="nombreEmpresa" placeholder="Nombre de la empresa">
    <input type="text" id="nitEmpresa" placeholder="NIT">

    <h2>Cuestionario</h2>

    <label>¿Cuántos empleados tiene?</label>
    <select id="empleados">
      <option>1-10</option>
      <option>11-50</option>
      <option>51-200</option>
      <option>200+</option>
    </select>

    <label>¿Tiene página web?</label>
    <select id="web">
      <option>Si</option>
      <option>No</option>
    </select>

    <label>¿Usa herramientas digitales?</label>
    <select id="digital">
      <option>Si</option>
      <option>No</option>
    </select>

    <label>¿Tiene procesos documentados?</label>
    <select id="procesos">
      <option>Si</option>
      <option>No</option>
    </select>

    <label>¿Realiza análisis financiero?</label>
    <select id="finanzas">
      <option>Si</option>
      <option>No</option>
    </select>

    <button onclick="guardarDiagnostico()">Guardar Diagnóstico</button>

    <button onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<!-- 🔥 FIREBASE (OBLIGATORIO Y EN ESTE ORDEN) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- 🔥 TU CONFIG -->
<script src="firebase.js"></script>

<!-- 🔥 TU LÓGICA -->
<script src="script.js"></script>

</body>
</html>
