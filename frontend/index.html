<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico Pymes</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <h1>Diagnóstico Pymes</h1>
    <p class="subtitle">Inicia sesión</p>

    <input type="text" id="usuario" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
  </div>

  <!-- EMPRESA -->
  <div id="empresa" class="card" style="display:none;">
    <h1>Datos de la Empresa</h1>

    <input type="text" id="nombreEmpresa" placeholder="Nombre empresa">
    <input type="text" id="nitEmpresa" placeholder="NIT">

    <button onclick="guardarEmpresa()">Continuar</button>
  </div>

  <!-- CUESTIONARIO -->
  <div id="cuestionario" class="card" style="display:none;">
    <h1>Auditoría Empresarial</h1>

    <!-- INFORMACIÓN GENERAL -->
    <div class="section">
      <h3>🏢 Información General</h3>

      <div class="field">
        <label>¿Cuántos empleados tiene la empresa?</label>
        <select id="gen1">
          <option value="">Seleccione</option>
          <option value="1">1 - 10</option>
          <option value="2">11 - 50</option>
          <option value="3">51 - 200</option>
          <option value="4">Más de 200</option>
        </select>
      </div>

      <div class="field">
        <label>¿Sector de la empresa?</label>
        <select id="gen2">
          <option value="">Seleccione</option>
          <option value="servicios">Servicios</option>
          <option value="comercio">Comercio</option>
          <option value="industrial">Industrial</option>
        </select>
      </div>

      <div class="field">
        <label>¿Años de operación?</label>
        <select id="gen3">
          <option value="">Seleccione</option>
          <option value="1">Menos de 1 año</option>
          <option value="2">1 - 3 años</option>
          <option value="3">4 - 10 años</option>
          <option value="4">Más de 10 años</option>
        </select>
      </div>
    </div>

    <!-- OPERACIONES -->
    <div class="section">
      <h3>🏭 Operaciones</h3>

      <div class="field">
        <label>¿Procesos documentados?</label>
        <select id="op1"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Control de inventarios?</label>
        <select id="op2"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Uso de sistemas digitales?</label>
        <select id="op3"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Se miden tiempos de operación?</label>
        <select id="op4"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Existen KPIs definidos?</label>
        <select id="op5"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>
    </div>

    <!-- FINANZAS -->
    <div class="section">
      <h3>💰 Finanzas</h3>

      <div class="field">
        <label>¿Registro formal de ingresos y gastos?</label>
        <select id="fin1"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Flujo de caja mensual?</label>
        <select id="fin2"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Control de costos y utilidades?</label>
        <select id="fin3"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Tiene deudas activas?</label>
        <select id="fin4"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Utiliza software contable?</label>
        <select id="fin5"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>
    </div>

    <!-- TALENTO HUMANO -->
    <div class="section">
      <h3>👥 Talento Humano</h3>

      <div class="field">
        <label>¿Funciones definidas?</label>
        <select id="tal1"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Capacitaciones periódicas?</label>
        <select id="tal2"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Evaluación de desempeño?</label>
        <select id="tal3"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Alta rotación de personal?</label>
        <select id="tal4"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Se mide productividad?</label>
        <select id="tal5"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>
    </div>

    <!-- COMERCIAL -->
    <div class="section">
      <h3>📊 Comercial</h3>

      <div class="field">
        <label>¿Tiene base de datos de clientes?</label>
        <select id="com1"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Mide satisfacción del cliente?</label>
        <select id="com2"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Tiene estrategia de marketing?</label>
        <select id="com3"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Usa redes sociales?</label>
        <select id="com4"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>

      <div class="field">
        <label>¿Tiene metas de ventas definidas?</label>
        <select id="com5"><option value="">Seleccione</option><option value="1">Sí</option><option value="0">No</option></select>
      </div>
    </div>

    <button onclick="analizar()">Analizar Empresa</button>
  </div>

  <!-- RESULTADO -->
  <div id="app" class="card" style="display:none;">
    <h1>Resultado del Diagnóstico</h1>

    <h2 id="empresaNombre"></h2>

    <div id="resultado"></div>

    <button onclick="logout()">Cerrar sesión</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
